<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>王某某的独行日志</title>
    <link rel="icon" type="image/x-icon" href="https://i.loli.net/2021/06/03/lFg2V4WUcmkB98G.png">
    <meta name="language" content="zh-CN">
    <meta name="title" content="王小达">
    <meta name="github" content="https://github.com/sun0225SUN/Awesome-Love-Code">
    <meta name="describe" content="爱情面前是是一张白纸! ">
    <link type="text/css" rel="stylesheet" href="./css/default.css">
    <link type="text/css" rel="stylesheet" href="./css/music-player.css">
    <script type="text/javascript" src="./js/jquery.min.js"></script>
    <script type="text/javascript" src="./js/jscex.min.js"></script>
    <script type="text/javascript" src="./js/jscex-parser.js"></script>
    <script type="text/javascript" src="./js/jscex-jit.js"></script>
    <script type="text/javascript" src="./js/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="./js/jscex-async.min.js"></script>
    <script type="text/javascript" src="./js/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="./js/functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="./js/love.js" charset="utf-8"></script>

</head>

<body>
    <div id="navbar">
        <button id="animation-btn" class="nav-btn active">动画</button>
        <button id="diary-btn" class="nav-btn">日记</button>
        <button id="music-btn" class="nav-btn music-btn">🎵 播放音乐</button>
    </div>
    <div id="diary-section">
        <div id="diary-content">
            <h2>我们的日记</h2>
            <p class="diary-intro">我长得丑没关系，我想的美啊。</p>
            <div id="diary-entries"></div>
        </div>
    </div>
    <div id="music-section">
        <div class="music-header">
            <h2>🎵 音乐播放器</h2>
            <button id="togglePlaylistBtn" class="toggle-playlist-btn">显示播放列表</button>
        </div>
        
        <div class="music-layout">
            <div class="music-list-section hidden">
                <div class="music-list-title">播放列表</div>
                <ul class="music-list">
                </ul>
            </div>
            
            <div class="music-player-container">
                <div class="current-song-info">
                    <div class="song-cover">
                        <span class="song-cover-icon">🎵</span>
                    </div>
                    <div class="song-title-display">正在加载...</div>
                    <div class="song-artist">点击左侧歌曲开始播放</div>
                </div>
                
                <div class="progress-section">
                    <div class="time-display">
                        <span class="current-time">00:00</span>
                        <span class="duration-time">00:00</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill"></div>
                    </div>
                </div>
                
                <div class="player-controls">
                    <button id="prevBtn" class="control-btn">⏮</button>
                    <button id="playPauseBtn" class="control-btn play-btn">▶</button>
                    <button id="nextBtn" class="control-btn">⏭</button>
                </div>
                
                <div class="volume-control">
                    <span class="volume-icon">🔊</span>
                    <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
                </div>
                
                <div class="lyrics-display">
                    <div class="lyrics-line">选择歌曲开始播放</div>
                </div>
            </div>
        </div>
    </div>
    <div id="main">
        <div id="error">亲，您使用的浏览器无法支持即将显示的内容，请换成谷歌(<a
                href="http://www.google.cn/chrome/intl/zh-CN/landing_chrome.html?hl=zh-CN&brand=CHMI">Chrome</a>)或者火狐(<a
                href="http://firefox.com.cn/download/">Firefox</a>)浏览器哟~</div>
        <h1 id="main-title"></h1>
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <div id="slideshow">
                        <img id="current-photo" src="" style="max-width: 100%; max-height: 100%; display: none;">
                    </div>
                </div>
            </div>
            <div id="clock-box">
                <a href="https://xtwa.org" target="_blank">老己</a> 和 <a href="https://xtwa.org"
                    target="_blank">老己</a> 在一起的
                <div id="clock"></div>
            </div>
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>

    </div>

    <div id="falling-texts-container"></div>
    <audio preload="auto" id="media" src="love.mp3" loop="loop"></audio>
    
    <script type="text/javascript" src="./js/music-player.js" charset="utf-8"></script>
    <script type="text/javascript" src="./js/main.js" charset="utf-8"></script>



</body>

</html>
